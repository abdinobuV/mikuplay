name: mikuplay
description: "A new Flutter project for MikuPlay Application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  just_audio: ^0.9.36
  audio_video_progress_bar: ^2.0.1

  cached_network_image: ^3.3.1
  lottie: ^3.1.0

  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0


  go_router: ^13.2.0


  google_sign_in: ^6.2.1


  google_fonts: ^6.2.1

  smooth_page_indicator: ^1.1.0

  image_picker: ^1.0.7
  google_generative_ai: ^0.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_mikuplay.png"
  adaptive_icon_background: "#0A0B2E"
  adaptive_icon_foreground: "assets/images/logo_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
