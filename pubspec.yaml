name: mikuplay
description: "A new Flutter project for MikuPlay Application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  just_audio: ^0.9.36
  audio_video_progress_bar: ^2.0.1

  cached_network_image: ^3.3.1
  lottie: ^3.1.0

  go_router: ^13.2.0

  google_fonts: ^6.2.1

  smooth_page_indicator: ^1.1.0

  image_picker: ^1.0.7
  google_generative_ai: ^0.4.7
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  google_sign_in: ^6.2.1
  firebase_storage: ^12.1.2
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.3
  rxdart: ^0.28.0
  just_audio_background: ^0.0.1-beta.17
  dio: ^5.9.2
  path_provider: ^2.1.5
  palette_generator: ^0.3.3+7
  flutter_screenutil: ^5.9.3
  supabase_flutter: ^2.14.2
  flutter_dotenv: ^6.0.1
  disk_space_2: ^1.0.12
  firebase_messaging: ^15.2.10
  googleapis_auth: ^2.3.2
  http: ^1.6.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_mikuplay.png"
  adaptive_icon_background: "#0A0B2E"
  adaptive_icon_foreground: "assets/images/logo_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/artists/
    - assets/fonts/
    - assets/audio/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
